  width="164"
  height="36"
  viewBox="0 0 164 36"
  role="img"
  aria-labelledby="title"
>
  <title id="title">Open NUGABOX</title>

  <style>
    .icon-area,
    .text-area {
      transition: fill 160ms ease;
    }

    svg:hover .icon-area {
      fill: #5A616E;
    }

    svg:hover .text-area {
      fill: #484D58;
    }
  </style>

  <!-- 전체 배경 -->
  <rect
    width="164"
    height="36"
    rx="6"
    fill="#282B34"
  />

  <!-- 아이콘 영역 -->
  <path
    class="icon-area"
    d="M6 0h34v36H6a6 6 0 0 1-6-6V6a6 6 0 0 1 6-6Z"
    fill="#4A505C"
  />

  <!-- 텍스트 영역 -->
  <path
    class="text-area"
    d="M40 0h118a6 6 0 0 1 6 6v24a6 6 0 0 1-6 6H40Z"
    fill="#3A3E48"
  />

  <!-- 구분선 -->
  <path
    d="M40 0v36"
    stroke="#59606C"
    stroke-width="1"
  />

  <!-- 박스 아이콘 -->
  <g
    transform="translate(10 8) scale(.8333)"
